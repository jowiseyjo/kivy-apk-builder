name: Build Kivy APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 🔥 INSTALL CLEAN ANDROID SDK (NO BUILD TOOLS 37 EVER)
    - name: Install Android SDK manually
      run: |
        sudo apt update
        sudo apt install -y wget unzip

        sudo mkdir -p /usr/local/lib/android/sdk/cmdline-tools
        cd /usr/local/lib/android/sdk/cmdline-tools

        sudo wget https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip
        sudo unzip commandlinetools-linux-*.zip
        sudo mv cmdline-tools latest

        export PATH=/usr/local/lib/android/sdk/cmdline-tools/latest/bin:$PATH

        yes | sdkmanager --licenses

        sdkmanager "platform-tools" \
                   "platforms;android-33" \
                   "build-tools;33.0.2"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
        autoconf automake libtool m4 pkg-config cmake build-essential \
        libffi-dev libssl-dev python3-setuptools

    - name: Install Buildozer
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36 buildozer

    # 🔥 CRITICAL FIX: FORCE BUILDOZER TO USE SYSTEM SDK ONLY
    - name: Force Buildozer config
      run: |
        mkdir -p ~/.buildozer

        cat > ~/.buildozer/global.ini << EOF
[buildozer]
log_level = 2

[app]

[android]
sdk_path = /usr/local/lib/android/sdk
ndk = 25b
android.sdk_path = /usr/local/lib/android/sdk
EOF

    # 🚀 BUILD APK (NO AUTO DOWNLOADS)
    - name: Build APK
      run: |
        export ANDROIDSDK=/usr/local/lib/android/sdk
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk

        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
