name: Build Kivy APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip autoconf automake libtool m4 pkg-config cmake build-essential libffi-dev libssl-dev

    - name: Install Buildozer
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36 buildozer

    - name: Pre-install Android SDK and Accept Licenses
      run: |
        # 1. Define the path where Buildozer expects the SDK
        export BZ_SDK_PATH=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $BZ_SDK_PATH/licenses

        # 2. Use the runner's built-in sdkmanager to install the specific version we want
        # This installs it directly into Buildozer's expected path
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$BZ_SDK_PATH \
          "platform-tools" \
          "build-tools;33.0.2" \
          "platforms;android-33"

        # 3. Manually write the license files as a secondary fallback
        echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e" > $BZ_SDK_PATH/licenses/android-sdk-license
        echo -e "84831b9409646a918e30573bab4c9c91346d8abd" > $BZ_SDK_PATH/licenses/android-sdk-preview-license

    - name: Build APK
      run: |
        # We run buildozer with the pre-installed SDK
        # The 'yes' prefix is a final safety net for any remaining prompts
        yes | buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
