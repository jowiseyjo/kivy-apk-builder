name: Build Kivy APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
        autoconf automake libtool m4 pkg-config cmake build-essential \
        libffi-dev libssl-dev python3-setuptools

    - name: Install Buildozer
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36 buildozer

    - name: Magic License Hack (The Nuclear Option)
      run: |
        # 1. Trigger Buildozer to CREATE the folders first (it will fail, that's fine)
        buildozer android pimpl || true
        
        # 2. Find EVERY 'licenses' directory in the home folder and inject the keys
        # This covers ~/.buildozer/android/platform/android-sdk/ and any variants
        for dir in $(find $HOME -type d -name "android-sdk" 2>/dev/null); do
          echo "Injecting licenses into $dir"
          mkdir -p "$dir/licenses"
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$dir/licenses/android-sdk-license"
          echo -e "84831b9409646a918e30573bab4c9c91346d8abd\n5046675910430d4d256e4a95e34a3f12ca1638df" > "$dir/licenses/android-sdk-preview-license"
        done

    - name: Build APK
      run: |
        # We use 'yes' to auto-reply to the prompt if the injection somehow missed
        yes | buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
