name: Build Kivy APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
        autoconf automake libtool m4 pkg-config cmake build-essential \
        libffi-dev libssl-dev

    - name: Install Python tools
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36
        pip install buildozer

    - name: Build APK (with License Acceptance)
      run: |
        # 1. Initialize the SDK directory structure
        buildozer android pimpl
        
        # 2. Dynamically accept all licenses for the Buildozer-managed SDK
        # This works regardless of whether it's Build-Tools 37 or 40.
        yes | ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses || true
        
        # 3. Run the actual build
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
