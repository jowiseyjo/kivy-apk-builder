name: Build Kivy APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
        autoconf automake libtool m4 pkg-config cmake build-essential \
        libffi-dev libssl-dev python3-setuptools

    - name: Install Buildozer
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36 buildozer

    - name: Force Install SDK 34 & Accept Licenses
      run: |
        # 1. Create the directories
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        
        # 2. Inject all possible license hashes (for 34 and 37)
        echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "84831b9409646a918e30573bab4c9c91346d8abd\n5046675910430d4d256e4a95e34a3f12ca1638df" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

        # 3. Use the system's sdkmanager to pre-install build-tools 34.0.0
        # This prevents Buildozer from trying to download 37 later
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk "build-tools;34.0.0" "platforms;android-34"

    - name: Build APK
      run: |
        # Use -v to see exactly where it fails if it does
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
