name: Build Kivy APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROIDAPI: "33"
      ANDROIDMINAPI: "21"
      ANDROIDNDK: "25b"
      ANDROIDSDK: "/usr/local/lib/android/sdk"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 🔥 INSTALL ANDROID SDK PROPERLY (SYSTEM LEVEL)
    - name: Install Android SDK
      run: |
        sudo mkdir -p /usr/local/lib/android/sdk/cmdline-tools
        cd /usr/local/lib/android/sdk/cmdline-tools

        sudo curl -o tools.zip https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip
        sudo unzip tools.zip
        sudo mv cmdline-tools latest

        export PATH=/usr/local/lib/android/sdk/cmdline-tools/latest/bin:$PATH

        yes | sdkmanager --licenses

        sdkmanager "platform-tools" \
                   "platforms;android-33" \
                   "build-tools;33.0.2"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
        autoconf automake libtool m4 pkg-config cmake build-essential \
        libffi-dev libssl-dev python3-setuptools

    - name: Install Python tools
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36 buildozer

    # 🔥 FORCE BUILDOZER TO USE SYSTEM SDK
    - name: Configure Buildozer
      run: |
        mkdir -p ~/.buildozer

        echo "[buildozer]" > ~/.buildozer/global.ini
        echo "log_level = 2" >> ~/.buildozer/global.ini

        echo "[android]" >> ~/.buildozer/global.ini
        echo "sdk_path = /usr/local/lib/android/sdk" >> ~/.buildozer/global.ini
        echo "ndk = 25b" >> ~/.buildozer/global.ini

    # 🚀 BUILD APK
    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
