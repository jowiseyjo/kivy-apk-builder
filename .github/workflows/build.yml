name: Build Kivy APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
        autoconf automake libtool m4 pkg-config cmake build-essential \
        libffi-dev libssl-dev python3-setuptools

    - name: Install Buildozer
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36 buildozer

    - name: Force License Injection
      run: |
        # Define Buildozer's SDK path
        export SDK_PATH=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_PATH/licenses
        
        # Inject the standard license hash
        echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $SDK_PATH/licenses/android-sdk-license
        # Inject the preview license hash (this covers version 37)
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > $SDK_PATH/licenses/android-sdk-preview-license
        
        # Pre-download the tools so Buildozer doesn't have to ask
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_PATH "build-tools;33.0.2" "platforms;android-33" "platform-tools"

    - name: Build APK
      run: |
        # Run buildozer in verbose mode
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
