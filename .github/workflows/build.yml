name: Build Kivy APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
        autoconf automake libtool m4 pkg-config cmake build-essential \
        libffi-dev libssl-dev python3-setuptools

    - name: Install Python tools
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36 buildozer

    # ✅ Initialize buildozer environment
    - name: Initialize Buildozer
      run: |
        buildozer init || true

    # 🔥 FIX: Force Android license acceptance
    - name: Inject Android Licenses
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses

        echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

        echo "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
        echo "5046675910430d4d256e4a95e34a3f12ca1638df" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

    # 🚀 Build APK
    - name: Build APK
      run: |
        yes | buildozer -v android debug

    # 📦 Upload APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
